<?xml version="1.0" encoding="UTF-8"?>
<!--
  rivalDrop favicon. Heavier strokes than icon.svg so the mark survives at 16x16/32x32.
  Vertex point and drop are also nudged up so the shape stays legible at tab-icon scale.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="rivalDrop">
  <title>rivalDrop</title>
  <line x1="4" y1="10" x2="32" y2="32" stroke="#0E1116" stroke-width="3.25" stroke-linecap="round"/>
  <line x1="4" y1="54" x2="32" y2="32" stroke="#0E1116" stroke-width="3.25" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="60" y2="32" stroke="#0E1116" stroke-width="2.75" stroke-linecap="round" stroke-dasharray="3.5 3.5"/>
  <circle cx="32" cy="32" r="4" fill="#0E1116"/>
  <circle cx="58" cy="32" r="5.5" fill="#FF5B1F"/>
</svg>
