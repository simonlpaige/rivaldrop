<?xml version="1.0" encoding="UTF-8"?>
<!--
  rivalDrop social card. 1200x630, ink background, mark center-left, headline right.
  TODO: raster export to og-image.png (1200x630) before launch. The Phase 1 brief
  permits shipping as SVG only when no headless renderer is available.
  Headline accent is on "competitor" to anchor the brand idea at first read.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>rivalDrop, social card</title>
  <rect x="0" y="0" width="1200" height="630" fill="#0E1116"/>

  <!-- Mark scaled 4x, vertex at (208, 315). -->
  <g transform="translate(80,187) scale(4)">
    <line x1="4" y1="10" x2="32" y2="32" stroke="#F6F5F1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="54" x2="32" y2="32" stroke="#F6F5F1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="60" y2="32" stroke="#F6F5F1" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>
    <circle cx="32" cy="32" r="3.2" fill="#F6F5F1"/>
    <circle cx="58" cy="32" r="4.5" fill="#FF5B1F"/>
  </g>

  <!-- Eyebrow -->
  <text x="400" y="220"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="18"
        letter-spacing="2.5"
        fill="#D8D6CD">RIVALDROP / COMPETITIVE INTEL</text>

  <!-- Headline. Two lines. Accent on "competitor". -->
  <text x="400" y="310"
        font-family="'Source Serif 4', Georgia, serif"
        font-weight="500"
        font-size="74"
        letter-spacing="-2"
        fill="#F6F5F1">What is your <tspan font-style="italic" fill="#FF5B1F">competitor</tspan></text>
  <text x="400" y="394"
        font-family="'Source Serif 4', Georgia, serif"
        font-weight="500"
        font-size="74"
        letter-spacing="-2"
        fill="#F6F5F1">doing right now?</text>

  <!-- Footer rule + tagline -->
  <line x1="400" y1="470" x2="540" y2="470" stroke="#3A4250" stroke-width="1"/>
  <text x="400" y="510"
        font-family="'Source Serif 4', Georgia, serif"
        font-size="22"
        fill="#D8D6CD">Watch. Capture. Drop.</text>
</svg>
