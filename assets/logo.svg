<?xml version="1.0" encoding="UTF-8"?>
<!--
  RivalDrop - Wordmark
  RivalDrop twist: signal-green "ping" dot precedes the wordmark
  (the only brand in the family that earns a symbolic element,
  per BRAND-FAMILY-SUMMARY judgment call #3).
  Palette: Near-white on Night Sky. Signal green ping, radar blue accent rule.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140" role="img" aria-label="RivalDrop">
  <style>
    .night   { fill: #0B1220; }
    .chalk   { fill: #E8EEF6; }
    .signal  { fill: #4FD38A; }
    .radar   { stroke: #4F7FD3; stroke-width: 1; }
    .display { font-family: "Source Serif 4", "Fraunces", Georgia, serif; font-weight: 700; }
    .mono    { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 500; letter-spacing: 0.24em; }
  </style>
  <rect class="night" width="560" height="140"/>
  <!-- radar ring rule under everything - cold precision -->
  <line class="radar" x1="40" y1="105" x2="520" y2="105"/>
  <!-- signal-green ping dot (the permitted symbol) -->
  <circle class="signal" cx="130" cy="70" r="6"/>
  <!-- faint outer ring for radar ping feel -->
  <circle cx="130" cy="70" r="12" fill="none" stroke="#4FD38A" stroke-width="1" opacity="0.35"/>
  <!-- wordmark -->
  <text class="display chalk" x="155" y="82" font-size="44" letter-spacing="-0.01em">RivalDrop</text>
  <!-- tagline in mono - data-instrument feel -->
  <text class="mono chalk" x="155" y="120" font-size="9" opacity="0.6">COMPETITIVE  INTELLIGENCE</text>
</svg>
